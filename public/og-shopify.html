<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap');
  body {
    width: 1200px;
    height: 628px;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
  }
  .container {
    width: 1200px;
    height: 628px;
    background: #1A1A1A;
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  /* Background product image — subtle */
  .bg-image {
    position: absolute;
    right: -60px;
    top: 50%;
    transform: translateY(-50%);
    width: 580px;
    height: 580px;
    object-fit: cover;
    border-radius: 50%;
    opacity: 0.15;
    filter: blur(1px);
  }
  /* Amber accent circle */
  .accent-circle {
    position: absolute;
    right: 180px;
    top: -100px;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: #F5A623;
    opacity: 0.06;
  }
  .accent-circle-2 {
    position: absolute;
    left: -80px;
    bottom: -120px;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: #F5A623;
    opacity: 0.04;
  }
  /* Content */
  .content {
    position: relative;
    z-index: 2;
    padding: 80px 90px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .logo-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo-icon {
    width: 52px;
    height: 52px;
  }
  .logo-wordmark {
    height: 36px;
    filter: brightness(0) invert(1);
  }
  .tagline {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #F5A623;
  }
  .title {
    font-size: 54px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.1;
    max-width: 600px;
  }
  .subtitle {
    font-size: 20px;
    color: rgba(255,255,255,0.55);
    max-width: 500px;
    line-height: 1.5;
  }
  .badges {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }
  .badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 50px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    font-weight: 500;
  }
  .badge-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #F5A623;
  }
  /* Right side: product image */
  .product-area {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
  }
  .product-img {
    width: 380px;
    height: 380px;
    object-fit: cover;
    border-radius: 24px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }
  /* Price badge */
  .price-badge {
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
    background: #F5A623;
    color: #1A1A1A;
    font-weight: 700;
    font-size: 18px;
    padding: 8px 24px;
    border-radius: 50px;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="container">
  <div class="accent-circle"></div>
  <div class="accent-circle-2"></div>

  <div class="content">
    <div class="logo-row">
      <img src="images/logos/whiskcam-logo-icon.webp" class="logo-icon" alt="">
      <img src="images/logos/whiskcam-logo-wordmark.webp" class="logo-wordmark" alt="">
    </div>
    <div class="tagline">Pet Collar Camera</div>
    <div class="title">See Their Secret World</div>
    <div class="subtitle">The ultra-light camera that shows you what your pet does all day.</div>
    <div class="badges">
      <div class="badge"><div class="badge-dot"></div>1080P Full HD</div>
      <div class="badge"><div class="badge-dot"></div>26g Ultra-Light</div>
      <div class="badge"><div class="badge-dot"></div>No App Needed</div>
    </div>
  </div>

  <div class="product-area">
    <img src="images/product/whiskcam-product-studio.webp" class="product-img" alt="">
    <div class="price-badge">Free Shipping — €49.90</div>
  </div>
</div>
</body>
</html>
